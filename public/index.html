async function hJSON(file){
  if(!file)return;
  if(file.size>10*1024*1024){return toast('✕ 文件过大，请上传小于10MB的文件')}
  var reader=new FileReader();
  reader.onload=async function(e){
    try{
      var t=JSON.parse(e.target.result);
      if(!t.columns||!Array.isArray(t.columns))throw new Error('模板格式错误：缺少 columns 数组');
      if(!t.rows||!Array.isArray(t.rows))throw new Error('模板格式错误：缺少 rows 数组');
      if(t.columns.length===0)throw new Error('模板格式错误：columns 不能为空');
      t.columns.forEach(function(col,idx){if(!col.header)throw new Error('第 '+(idx+1)+' 列缺少 header 字段')});
      // 【新增】JSON 导入时查重
      var jsonHeaders = t.columns.map(function(col) { return col.header || ''; });
      var jsonDedup = deduplicateHeaders(jsonHeaders);
      if (jsonDedup.hasDuplicate) {
          jsonDedup.renamed.forEach(function(item) {
              t.columns[item.index].header = item.newName;
          });
          var renameMsg = '检测到重复字段名，已自动重命名：\n';
          jsonDedup.renamed.forEach(function(item) {
              renameMsg += '第 ' + (item.index + 1) + ' 列：「' + item.oldName + '」 → 「' + item.newName + '」\n';
          });
          renameMsg += '\n导入后可在模板编辑中修改字段名称';
          toast('⚠️ 检测到重复字段名，已自动重命名');
      }      
      if(t.rows.length>50000){toast('⚠️ 数据量较大（'+t.rows.length+'行），导入可能需要较长时间')}
      if(!t.id)t.id=genId();if(!t.filterField)t.filterField='';if(!t.titleFields)t.titleFields=[];if(!t.rules)t.rules=[];
      t.columns.forEach(function(col){if(col.isEditable===undefined)col.isEditable=true;if(col.required===undefined)col.required=false;if(col.included===undefined)col.included=true;if(!col.uniqueValues)col.uniqueValues=[];if(!col.type)col.type='text'});

      showLoading('正在导入模板...');
      var existing=D.tpls.findIndex(function(x){return x.id===t.id});
      var doSave = async function() {
        if (!D.members) D.members = {};
        if (t.members && Array.isArray(t.members)) {
          D.members[t.id] = t.members;
        } else if (!D.members[t.id]) {
          D.members[t.id] = [];
        }
      
        // 【修复】覆盖时更新内存中已有模板，新增时 push
        if (existing >= 0) {
          D.tpls[existing] = t;
        } else {
          D.tpls.push(t);
        }
      
        await API.createTemplate({
          id: t.id,
          name: t.name,
          columns: t.columns,
          rows: t.rows,
          filterField: t.filterField || '',
          titleFields: t.titleFields || [],
          rules: t.rules || []
        });
      
        if (D.members[t.id] && D.members[t.id].length) {
          await svMembers(t.id);
        }
      
        hideLoading();
        rAdmin();
        toast('✓ JSON导入成功');
      };

      if (existing >= 0) {
        confirmModal('已存在同ID模板「' + D.tpls[existing].name + '」，是否覆盖？', doSave);
        hideLoading();
        return;
      } else {
        //D.tpls.push(t);
        await doSave();
      }
    }catch(err){hideLoading();console.error('JSON导入失败:',err);toast('✕ '+(err.message||'解析失败'))}
  };
  reader.onerror=function(){toast('✕ 文件读取失败')};
  reader.readAsText(file);
}

function hExcel(file){
  if(!file)return;
  var ext=file.name.split('.').pop().toLowerCase();
  if(!['xlsx','xls','csv'].includes(ext))return toast('✕ 不支持的格式，请上传 .xlsx/.xls/.csv 文件');
  if(file.size>10*1024*1024)return toast('✕ 文件过大，请上传小于10MB的文件');
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true,dateNF:'yyyy-MM-dd'});
      if(!wb.SheetNames||!wb.SheetNames.length)throw new Error('文件中没有工作表');
      var sheet=wb.Sheets[wb.SheetNames[0]];var data=XLSX.utils.sheet_to_json(sheet,{header:1,defval:'',blankrows:false});
      if(!data||data.length<2)throw new Error('数据不足，至少需要表头和一行数据');
      if(data[0].length>50)throw new Error('列数过多（最多50列），请精简数据');
      // 【修改】Excel 导入时查重
      var rawHeaders = data[0].map(function(h, i) { return String(h || '').trim() || ('列' + (i + 1)); });
      var dedupResult = deduplicateHeaders(rawHeaders);
      var headers = dedupResult.headers;
      duplicateHintHtml = dedupResult.hasDuplicate ? buildDuplicateHint(dedupResult.renamed) : '';
      var rows=data.slice(1).map(function(r){return headers.map(function(_,i){var v=r[i];if(v==null)return'';if(v instanceof Date)return v.toISOString().split('T')[0];return String(v).trim()})});
      pex={headers,rows,fileName:file.name};
      colm=headers.map(function(header,ci){
        var uniq = extractUniqueValues(rows, ci);
        var type='text';
        if(uniq.length > 0 && uniq.every(function(v){return/^-?\d+(\.\d+)?$/.test(v)})) type='number';
        else if(uniq.length > 0 && uniq.every(function(v){return/^\d{4}-\d{2}-\d{2}$/.test(v)})) type='date';
        else if(uniq.length <= 8 && uniq.length >= 2 && rows.length >= 3) type='select';
        else if(uniq.some(function(v){return v.length > 40})) type='textarea';
        var required=/[*必|required]/i.test(header);
        var isEditable=/进展|结果|备注|状态|反馈|完成|说明|数量|金额|评价|评分|意见|计划|总结|数据|变更|更新|修改/i.test(header);
        return{header,type,required,isEditable,included:true,sampleValues:uniq.slice(0,5),uniqueValues:uniq}
      });
      showPv();
    }catch(err){
      console.error('Excel解析失败:',err);pex=null;colm=[];
      toast('✕ 解析失败: '+err.message);
    }
  };
  reader.onerror=function(){toast('✕ 文件读取失败')};
  reader.readAsArrayBuffer(file);
}

function showPv(){
  if(!pex)return;var headers=pex.headers,rows=pex.rows,fileName=pex.fileName;
  var pv=rows.slice(0,5);
  var h=duplicateHintHtml+'<div class="di"><span class="ii">✓</span><div><strong>'+E(fileName)+'</strong><br>'+headers.length+' 列 · '+rows.length+' 行</div></div>';
  h+='<div class="cd-t" style="margin-top:12px">👁️ 数据预览</div>';
  h+='<div class="ep"><table><thead><tr>'+headers.map(function(hd){return'<th>'+E(hd)+'</th>'}).join('')+'</tr></thead><tbody>';

  if(rows.length>5)h+='<tr><td colspan="'+headers.length+'" style="text-align:center;color:var(--tm)">...共'+rows.length+'行</td></tr>';
  h+='</tbody></table></div>';

  h+='<div class="admin-cd" style="margin-top:12px"><div class="cd-t">🔍 筛选字段</div><p style="font-size:12px;color:var(--tm);margin-bottom:10px">选择一个字段作为筛选依据（通常是姓名列），填报时按此字段自动匹配填报人数据</p><select class="fs" id="pvFilterField"><option value="">-- 不启用 --</option>'+colm.map(function(m){return'<option value="'+E(m.header)+'">'+E(m.header)+'</option>'}).join('')+'</select></div>';

  h+='<div class="admin-cd" style="margin-top:12px"><div class="cd-t">🏷️ 行标题字段</div><p style="font-size:12px;color:var(--tm);margin-bottom:10px">选择用于标识每行数据的字段（如项目名称、编号等），多个字段用 · 连接显示</p><div class="title-select-row" id="pvTitleFields">'+colm.map(function(m,i){return'<div class="title-chip" onclick="this.classList.toggle(\'on\')" data-idx="'+i+'">'+E(m.header)+'</div>'}).join('')+'</div></div>';

  h+='<div class="admin-cd" style="margin-top:12px"><div class="cd-t">👥 预提取填报成员</div><p style="font-size:12px;color:var(--tm);margin-bottom:10px">从上方「筛选字段」列中自动提取不重复的成员姓名，导入后可直接使用</p><div id="pvMembersPreview" style="font-size:13px;color:var(--ts)">请先选择筛选字段</div></div>';

  h+='<div class="cd-t" style="margin-top:12px">🔧 字段配置</div><div style="font-size:12px;color:var(--tm);margin-bottom:12px"><strong style="color:var(--a)">🔒固定</strong> 只读 · <strong style="color:var(--w)">✏️可填</strong> 需填报 · <strong style="color:var(--d)">*必填</strong></div><div class="field-edit-grid">';

  colm.forEach(function(m,i){
    var isSel=m.type==='select';var opts=(m.uniqueValues||[]).join(',');var samps=m.sampleValues||[];
    h+='<div class="fe-card" id="pvCard_'+i+'"><div class="fe-header"><div class="fe-num">'+(i+1)+'</div><div class="fe-name">'+E(m.header)+'</div></div>';
    h+='<div class="fe-row"><span class="fe-label">名称</span><input class="fi" style="flex:1;font-size:12px;padding:5px 8px" value="'+E(m.header)+'" onchange="colm['+i+'].header=this.value"></div>';
    h+='<div class="fe-row"><span class="fe-label">类型</span><select class="fs pv-type-sel" data-idx="'+i+'" style="flex:1;font-size:12px;padding:5px 28px 5px 8px"><option value="text" '+(m.type==='text'?'selected':'')+'>文本</option><option value="number" '+(m.type==='number'?'selected':'')+'>数字</option><option value="textarea" '+(m.type==='textarea'?'selected':'')+'>多行</option><option value="select" '+(isSel?'selected':'')+'>下拉</option><option value="date" '+(m.type==='date'?'selected':'')+'>日期</option><option value="sequence" '+(m.type==='sequence'?'selected':'')+'>序列</option></select></div>';
    h+='<div class="fe-row" id="pv_opts_row_'+i+'" style="'+(isSel?'':'display:none')+'"><span class="fe-label">选项</span><input class="fi pv-opts-input" data-idx="'+i+'" style="flex:1;font-size:12px;padding:5px 8px" value="'+E(opts)+'" placeholder="选项之间用逗号分隔"></div>';
    h+='<div style="font-size:11px;color:var(--tm);margin-bottom:6px">示例: '+samps.slice(0,3).map(function(v){return E(v)}).join('、')+(samps.length>3?' ...':'')+'</div>';
    h+='<div class="fe-row" style="gap:10px"><div class="fe-toggle"><span>可填</span><div class="sw ss '+(m.isEditable?'on':'')+'" onclick="this.classList.toggle(\'on\');colm['+i+'].isEditable=this.classList.contains(\'on\')"></div></div><div class="fe-toggle"><span>必填</span><div class="sw ss '+(m.required?'on':'')+'" onclick="this.classList.toggle(\'on\');colm['+i+'].required=this.classList.contains(\'on\')"></div></div><div class="fe-toggle"><span>包含</span><div class="sw ss '+(m.included!==false?'on':'')+'" onclick="this.classList.toggle(\'on\');colm['+i+'].included=this.classList.contains(\'on\');this.closest(\'.fe-card\').style.opacity=this.classList.contains(\'on\')?\'1\':\'0.4\'"></div></div></div></div>';
  });

  h+='</div>';
  h+='<div class="bg" style="margin-top:16px"><button class="btn btn-s bs" onclick="pex=null;colm=[];document.getElementById(\'pvArea\').innerHTML=\'\'">取消</button><button class="btn btn-p bs" onclick="impConfirm()" style="flex:1">✓ 确认导入</button></div>';

  document.getElementById('pvArea').innerHTML=h;

  var filterEl=document.getElementById('pvFilterField');
  if(filterEl){filterEl.addEventListener('change',function(){updatePvMembers(this.value)})}

  document.querySelectorAll('.pv-type-sel').forEach(function(sel){
    sel.addEventListener('change',function(){
      var idx=parseInt(this.dataset.idx);colm[idx].type=this.value;
      var optsRow=document.getElementById('pv_opts_row_'+idx);
      if(optsRow){optsRow.style.display=(this.value==='select')?'':'none'}
    });
  });

  document.querySelectorAll('.pv-opts-input').forEach(function(inp){
    inp.addEventListener('change',function(){
      var idx=parseInt(this.dataset.idx);
      colm[idx].uniqueValues=this.value.split(',').map(function(s){return s.trim()}).filter(Boolean);
    });
  });
}

function updatePvMembers(fieldName){
  var preview=document.getElementById('pvMembersPreview');if(!preview)return;
  if(!fieldName||!pex){preview.innerHTML='<span style="color:var(--tm)">请先选择筛选字段</span>';return}
  var colIdx=pex.headers.indexOf(fieldName);
  if(colIdx<0){preview.innerHTML='<span style="color:var(--d)">字段未找到</span>';return}
  var uniq=extractUniqueValues(pex.rows,colIdx);
  if(!uniq.length){preview.innerHTML='<span style="color:var(--tm)">该列无数据</span>';return}
  preview.innerHTML='<div style="font-size:12px;color:var(--tm);margin-bottom:6px">共 '+uniq.length+' 位成员</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+uniq.map(function(m){return'<span class="tg tg-i">'+E(m)+'</span>'}).join('')+'</div>';
}

// 【修改】Excel 导入确认（增加查重）
async function impConfirm() {
    if (!pex) return toast('请先上传文件');
    showLoading('正在导入数据...');
    try {
        // 二次查重：用户在预览界面可能手动修改了字段名，导致新的重复
        var confirmHeaders = colm.map(function(m) { return m.header; });
        var confirmDedup = deduplicateHeaders(confirmHeaders);
        if (confirmDedup.hasDuplicate) {
            confirmDedup.renamed.forEach(function(item) {
                colm[item.index].header = item.newName;
            });
            toast('⚠️ 检测到 ' + confirmDedup.renamed.length + ' 个重复字段，已自动重命名');
        }

        var filterEl = document.getElementById('pvFilterField');
        var filterField = filterEl ? filterEl.value : '';

        // 提取行标题字段
        var titleChips = document.querySelectorAll('#pvTitleFields .title-chip.on');
        var titleFields = [];
        titleChips.forEach(function(chip) {
            var idx = parseInt(chip.getAttribute('data-idx'));
            if (!isNaN(idx) && colm[idx]) titleFields.push(colm[idx].header);
        });

        // 从筛选字段列提取成员
        var members = [];
        if (filterField && pex) {
            var colIdx = pex.headers.indexOf(filterField);
            if (colIdx >= 0) {
                members = extractUniqueValues(pex.rows, colIdx);
            }
        }

        // 大数据量确认
        if (pex.rows.length > 10000) {
            toast('⚠️ 数据量较大（' + pex.rows.length + '行），导入可能需要较长时间');
        }

        // 构建模板
        var name = pex.fileName.replace(/\.[^.]+$/, '');
        var id = genId();
        var columns = colm.map(function(m, i) {
            return {
                id: 'c' + i,
                header: m.header,
                type: m.type,
                required: m.required,
                isEditable: m.isEditable,
                included: m.included !== false,
                uniqueValues: m.uniqueValues || []
            };
        });
        var rows = pex.rows.map(function(r, i) {
            var obj = { _idx: String(i) };
            r.forEach(function(v, j) { if (columns[j]) obj[columns[j].header] = v; });
            return obj;
        });

        var tpl = { id: id, name: name, columns: columns, rows: rows, filterField: filterField, titleFields: titleFields };
        D.tpls.push(tpl);
        if (!D.members) D.members = {};
        D.members[id] = members;
        await API.createTemplate({
            id: tpl.id,
            name: tpl.name,
            columns: tpl.columns,
            rows: tpl.rows,
            filterField: tpl.filterField,
            titleFields: tpl.titleFields
        });
        if (members.length) {
            await svMembers(tpl.id);
        }
        pex = null;
        colm = [];
        hideLoading();
        rAdmin();
        toast('✓ 导入成功: ' + name + (members.length ? '（' + members.length + '位成员已自动提取）' : ''));
    } catch (err) {
        hideLoading();
        console.error('导入失败:', err);
        toast('✕ 导入失败: ' + (err.message || '未知错误'));
    }
}
