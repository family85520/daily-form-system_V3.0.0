<script>
/* =============================================
   通用工具函数
   ============================================= */
function showLoading(text){
  text=text||'加载中...';
  var overlay=document.getElementById('loadingOverlay');
  if(overlay){
    var lt=overlay.querySelector('.loading-text');
    if(lt)lt.textContent=text;
    overlay.style.display='flex';
  }
}
function hideLoading(){
  var overlay=document.getElementById('loadingOverlay');
  if(overlay)overlay.style.display='none';
}

function sanitizeInput(input){
  if(typeof input!=='string')return input;
  return input.replace(/</g,'&lt;').replace(/>/g,'&gt;').trim();
}

/* =============================================
   工具函数：判断对象是否有任意非空值
   ============================================= */
function hasAnyValue(obj) {
    if (!obj || typeof obj !== 'object') return false;
    var keys = Object.keys(obj);
    for (var i = 0; i < keys.length; i++) {
        var v = obj[keys[i]];
        if (v && String(v).trim()) return true;
    }
    return false;
}

/* =============================================
   【新增】移动端输入框自动滚动
   ============================================= */
document.addEventListener('focusin', function(e) {
    if (e.target.classList.contains('fi') ||
        e.target.classList.contains('ft') ||
        e.target.classList.contains('fs')) {
        setTimeout(function() {
            e.target.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 300);
    }
});

/* =============================================
   【新增】Token 辅助函数
   位置：放在 const API={ 之前
   ============================================= */

// 构建带 token 的请求头
function authHeaders() {
    var h = { 'Content-Type': 'application/json' };
    if (authToken) h['x-auth-token'] = authToken;
    return h;
}

// 保存 token
function saveToken(token) {
    authToken = token;
    localStorage.setItem('authToken', token);
}

// 清除 token
function clearToken() {
    authToken = '';
    localStorage.removeItem('authToken');
}

// ===== 全局 fetch 拦截：自动处理 401 =====
var _origFetch = window.fetch;
window.fetch = async function () {
    var res = await _origFetch.apply(this, arguments);
    if (res.status === 401 && authToken) {
        clearToken();
        aOK = false;
        authToken = '';
        toast('🔒 会话已过期，请重新登录');
        if (document.getElementById('pAdmin').classList.contains('on')) rAdmin();
        if (document.getElementById('pStat').classList.contains('on')) rStat();
    }
    return res;
};

/* =============================================
   API
   ============================================= */
const API = {
    async getData(retryCount) {
        retryCount = retryCount || 3;
        for (var i = 0; i < retryCount; i++) {
            try {
                var r = await fetch('/api/data');
                if (!r.ok) throw new Error('HTTP ' + r.status);
                var d = await r.json();
                if (!d.success) throw new Error(d.error || '获取数据失败');
                return d.data;
            } catch (err) {
                console.error('获取数据失败 (尝试 ' + (i + 1) + '/' + retryCount + '):', err);
                if (i === retryCount - 1) throw new Error('无法连接到服务器，请检查网络连接');
                await new Promise(function (res) { setTimeout(res, 1000 * (i + 1)); });
            }
        }
    },

    // 保存单条提交（已有，保持不变）
    async saveSubmission(tplId, date, user, submissions) {
        var r = await fetch('/api/submission', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tplId: tplId, date: date, user: user, submissions: submissions })
        });
        var d = await r.json();
        if (!d.success) throw new Error(d.error || '保存失败');
    },

    // 【新增】创建模板
    async createTemplate(tpl) {
        var r = await fetch('/api/template', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(tpl)
        });
        var d = await r.json();
        if (!d.success) throw new Error(d.error || '创建模板失败');
        return d;
    },

    // 【新增】更新模板
    async updateTemplate(tplId, tpl) {
        var r = await fetch('/api/template/' + tplId, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(tpl)
        });
        var d = await r.json();
        if (!d.success) throw new Error(d.error || '更新模板失败');
        return d;
    },

    // 【新增】保存成员列表
    async saveMembers(tplId, members) {
        var r = await fetch('/api/members', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tplId: tplId, members: members })
        });
        var d = await r.json();
        if (!d.success) throw new Error(d.error || '保存成员失败');
    },

    async verifyPwd(pwd) {
        var r = await fetch('/api/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: pwd })
        });
        var d = await r.json();
        if (d.success && d.token) {
            saveToken(d.token);
        }
        return d.success;
    },

    async changePwd(o, n) {
        var r = await fetch('/api/password', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ oldPwd: o, newPwd: n })
        });
        return r.json();
    },
    
    async deleteSubmission(tplId, date, user, rowIndex) {
        var r = await fetch('/api/submission?tplId=' + encodeURIComponent(tplId) + '&date=' + encodeURIComponent(date) + '&user=' + encodeURIComponent(user) + '&rowIndex=' + rowIndex, { method: 'DELETE' });
        var d = await r.json();
        if (!d.success) throw new Error(d.error || '删除失败');
    },
    
    async deleteTemplate(id) {
        var r = await fetch('/api/template/' + id, { method: 'DELETE' });
        return r.json();
    },

    async resetAll(pwd) {
        var r = await fetch('/api/reset', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({ password: pwd })
        });
        return r.json();
    }
};

/* =============================================
   STATE
   ============================================= */
var D={tpls:[],members:{},sub:{}};
var cu = '', cd = todayStr(), pex = null, colm = [], filterOverride = null, aOK = false, serverConnected = false;

var authToken = localStorage.getItem('authToken') || '';  // 【新增】持久化 token

// ===== 提交锁：防止重复请求 =====
var _submitLock = 0;
function lockSubmit() {
    var now = Date.now();
    if (now - _submitLock < 2000) return false;
    _submitLock = now;
    return true;
}

/* =============================================
   PERSISTENCE
   ============================================= */
async function ld(){
  try{
    var data=await API.getData();
    D=data;
    if(D.tpl&&!D.tpls){D.tpls=[{...D.tpl,id:'tpl_default'}];delete D.tpl}
    if(!D.tpls)D.tpls=[];
    if(!D.sub)D.sub={};
    if(Array.isArray(D.members)){
      var arr=D.members;
      D.members={};
      if(D.tpls.length){
        D.tpls.forEach(function(t){D.members[t.id]=[...arr]});
      }else{
        D.members['0']=arr;
      }
    }
    if(!D.members||typeof D.members!=='object')D.members={};
    D.tpls.forEach(function(t){if(!t.id)t.id='tpl_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);if(!D.members[t.id])D.members[t.id]=[]});
    serverConnected=true;updateConnStatus('ok');
  }catch(err){console.error(err);serverConnected=false;updateConnStatus('err');toast('⚠️ '+err.message)}
}

async function svSub(tplId,date,user,submissions){
  try{
    await API.saveSubmission(tplId,date,user,submissions);
    if(!D.sub[tplId])D.sub[tplId]={};
    if(!D.sub[tplId][date])D.sub[tplId][date]={};
    if(!D.sub[tplId][date][user])D.sub[tplId][date][user]={};
    Object.assign(D.sub[tplId][date][user],submissions);
    if(!D.members)D.members={};
    if(!D.members[tplId])D.members[tplId]=[];
    if(user&&!D.members[tplId].includes(user)){
      D.members[tplId].push(user);
      await svMembers(tplId);
    }
    serverConnected=true;updateConnStatus('ok');
  }catch(err){serverConnected=false;updateConnStatus('err');toast('⚠️ 提交失败')}
}

// 保存单个模板到后端
async function svTpl(tpl, fieldRenames) {
    try {
        var body = {
            name: tpl.name,
            columns: tpl.columns,
            rows: tpl.rows,
            filterField: tpl.filterField || '',
            titleFields: tpl.titleFields || [],
            rules: tpl.rules || []
        };
        if (fieldRenames && Object.keys(fieldRenames).length) {
            body.fieldRenames = fieldRenames;
        }
        await API.updateTemplate(tpl.id, body);
        serverConnected = true;
        updateConnStatus('ok');
    } catch (err) {
        console.error('保存模板失败:', err);
        serverConnected = false;
        updateConnStatus('err');
        toast('⚠️ 保存模板失败');
    }
}

// 保存单个模板的成员列表到后端
async function svMembers(tplId) {
    try {
        var list = (D.members && D.members[tplId]) ? D.members[tplId] : [];
        await API.saveMembers(tplId, list);
        serverConnected = true;
        updateConnStatus('ok');
    } catch (err) {
        console.error('保存成员失败:', err);
        serverConnected = false;
        updateConnStatus('err');
    }
}

// 保留旧的全量保存作为兼容（极少数场景可能用到）
async function svFull(data) {
    try {
        await fetch('/api/data', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        serverConnected = true;
        updateConnStatus('ok');
    } catch (err) {
        console.error(err);
        serverConnected = false;
        updateConnStatus('err');
        toast('⚠️ 保存失败');
    }
}

function updateConnStatus(s){var el=document.getElementById('connStatus');if(!el)return;if(s==='ok'){el.textContent='● 已连接';el.className='conn-status conn-ok'}else if(s==='err'){el.textContent='● 离线';el.className='conn-status conn-err'}else{el.textContent='连接中...';el.className='conn-status conn-loading'}}

/* =============================================
   【新增】检查登录状态
   位置：放在 function updateConnStatus(s) 之后
   ============================================= */
async function checkAuth() {
    if (!authToken) return false;
    try {
        var r = await fetch('/api/auth/check', {
            headers: authHeaders()
        });
        var d = await r.json();
        if (d.success) {
            aOK = true;
            return true;
        }
    } catch (e) {
        // 网络异常时不处理
    }
    clearToken();
    aOK = false;
    return false;
}

/* =============================================
   UTILS
   ============================================= */
function todayStr(){var d=new Date();return d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate())}
function P(n){return String(n).padStart(2,'0')}
function fd(s){var d=new Date(s);var w=['日','一','二','三','四','五','六'];return(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+w[d.getDay()]}
function yd(s){var d=new Date(s);d.setDate(d.getDate()-1);return d.getFullYear()+'-'+P(d.getMonth()+1)+'-'+P(d.getDate())}
function E(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/\\/g,'&#92;')}
function genId(){return'tpl_'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}
function getTplMembers(tplId){if(D.members&&D.members[tplId]&&Array.isArray(D.members[tplId]))return D.members[tplId];return[]}
function getAllMembersSet(){var s=new Set();if(D.members&&typeof D.members==='object'&&!Array.isArray(D.members)){Object.values(D.members).forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(m){s.add(m)})})}return[...s]}

/* =============================================
   CORE
   ============================================= */
function getTpl(id){return D.tpls.find(function(t){return t.id===id})||null}
function getActive(){return getTpl(activeTid)}
function getTplSub(tplId){return D.sub[tplId]||{}}

/* =============================================
   批量计算所有行有效值（核心函数）
   行级继承逻辑：
     1. 今日该行有任意数据 → 整行继承今日（空字段保持空）
     2. 无 → 找最近一次该行有任意数据的日期 → 整行继承（空字段保持空）
     3. 都无 → 整行继承基础数据
   绝不允许单字段跨日期混合继承
   ============================================= */
function batchGetEffectiveRows(tpl, forDate, forUser) {
    var eCols = tpl.columns.filter(function(c) { return c.isEditable && c.included; });
    var headers = eCols.map(function(c) { return c.header; });
    var rowCount = tpl.rows ? tpl.rows.length : 0;
    var results = new Array(rowCount);

    // 初始化所有行为 empty
    for (var ri = 0; ri < rowCount; ri++) {
        var result = {};
        headers.forEach(function(h) { result[h] = { val: '', src: 'empty' }; });
        results[ri] = result;
    }

    // 第一轮：今日数据
    // 判断依据：该行在今日提交记录中存在（即使全空），说明用户已处理过该行
    var todayData = ((D.sub[tpl.id] || {})[forDate] || {})[forUser] || {};
    var todaySubmitted = {};
    for (var ri in todayData) {
        var row = todayData[ri];
        if (!row) continue;
        var idx = parseInt(ri);
        if (idx >= rowCount || !results[idx]) continue;
        todaySubmitted[idx] = true;
        // 非空值标记为 today，空值保持 empty 但不再回退历史
        headers.forEach(function(h) {
            if (row[h] !== undefined && row[h] !== '') {
                results[idx][h] = { val: row[h], src: 'today' };
            }
        });
    }

    // 第二轮：历史数据（行级继承，找到最近一次有数据的日期整行继承）
    var tplSub = D.sub[tpl.id] || {};
    var sortedDates = Object.keys(tplSub).sort().reverse();
    for (var di = 0; di < sortedDates.length; di++) {
        var d = sortedDates[di];
        if (d >= forDate) continue;
        var ud = ((tplSub[d] || {})[forUser] || {});
        for (var ri in ud) {
            var row = ud[ri];
            if (!row) continue;
            if (typeof row !== 'object') continue;
            var idx = parseInt(ri);
            if (idx >= rowCount || !results[idx]) continue;
            // 只处理今日未提交的行（今日已提交的行即使全空也不回退历史）
            var r = results[idx];
            if (todaySubmitted[idx]) continue;
            // 整行继承：有值的字段标记 prev，空字段保持 empty
            headers.forEach(function(h) {
                if (row[h] !== undefined && row[h] !== '') {
                    r[h] = { val: row[h], src: 'prev' };
                }
            });
        }
    }

    // 第三轮：基础数据（今日和历史都未处理过的行）
    // 判断逻辑：该行是否在任何历史提交中存在过（key存在即算处理过）
    if (tpl.rows) {
        for (var ri = 0; ri < rowCount; ri++) {
            var baseRow = tpl.rows[ri];
            if (!baseRow) continue;
            var r = results[ri];
            if (todaySubmitted[ri]) continue;
            var hasPrev = headers.some(function(h) { return r[h].src === 'prev'; });
            if (hasPrev) continue;
            // 还需检查：该行是否在历史提交中存在（即使值为空）
            var rowHandledInHistory = false;
            for (var di = 0; di < sortedDates.length; di++) {
                var d2 = sortedDates[di];
                if (d2 >= forDate) continue;
                var ud2 = ((tplSub[d2] || {})[forUser] || {});
                if (ri in ud2) { rowHandledInHistory = true; break; }
            }
            if (rowHandledInHistory) continue;
            // 真正无历史记录的行，继承基础数据
            headers.forEach(function(h) {
                var bv = baseRow[h];
                if (bv !== undefined && bv !== '') {
                    r[h] = { val: bv, src: 'base' };
                }
            });
        }
    }

    return results;
}

/* =============================================
   统一：单行有效值（委托 batchGetEffectiveRows）
   返回: { header1: {val, src}, header2: {val, src}, ... }
   ============================================= */
function getEffectiveRowAll(tpl, ri, forDate, forUser) {
    var all = batchGetEffectiveRows(tpl, forDate, forUser);
    return all[ri] || {};
}

/* =============================================
   统一：单字段有效值（委托 batchGetEffectiveRows）
   返回: {val, src}
   ============================================= */
function getEffectiveVal(tpl, ri, header, forDate, forUser) {
    var row = getEffectiveRowAll(tpl, ri, forDate, forUser);
    return row[header] || { val: '', src: 'empty' };
}

// 别名
function getEffectiveRow(tpl, ri, forDate, forUser) { return getEffectiveRowAll(tpl, ri, forDate, forUser); }
/* =============================================
   单条数据字段校验
   ============================================= */
/* =============================================
   字段校验：纯函数，返回单个字段的所有错误（不含上下文前缀）
   ============================================= */
function validateField(col, value) {
    var errors = [];
    var val = (value || '').trim();

    // 必填校验
    if (col.required && !val) {
        errors.push('为必填项');
        return errors; // 必填为空时不再做后续校验
    }
    if (!val) return errors; // 非必填且为空，跳过后续校验

    var con = col.constraints || {};

    // 数字类型校验
    if (col.type === 'number') {
        if (isNaN(Number(val))) {
            errors.push('必须为数字');
            return errors; // 非数字时不继续检查范围
        }
        var numVal = Number(val);
        if (con.min !== undefined && con.min !== null && numVal < con.min) {
            errors.push('不能小于 ' + con.min);
        }
        if (con.max !== undefined && con.max !== null && numVal > con.max) {
            errors.push('不能大于 ' + con.max);
        }
    }

    // 日期格式校验
    if (col.type === 'date') {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(val)) {
            errors.push('日期格式应为 YYYY-MM-DD');
        }
    }

    // 文本长度校验
    if (col.type === 'text' || col.type === 'textarea') {
        if (con.minLength && val.length < con.minLength) {
            errors.push('长度不能少于 ' + con.minLength + ' 个字符');
        }
        if (con.maxLength && val.length > con.maxLength) {
            errors.push('长度不能超过 ' + con.maxLength + ' 个字符');
        }
    }

    // 下拉选项校验
    if (col.type === 'select' && col.uniqueValues && col.uniqueValues.length) {
        if (!col.uniqueValues.includes(val)) {
            errors.push('值不在可选范围内');
        }
    }

    // 正则校验
    if (con.pattern) {
        try {
            var regex = new RegExp(con.pattern);
            if (!regex.test(val)) {
                errors.push(con.errorMessage || '格式不正确');
            }
        } catch (e) { }
    }

    return errors;
}

function validateSubmission(tpl, ri, rd, allCols, ff, user) {
    var errors = [];
    allCols.forEach(function (c) {
        if (ff && c.header === ff) return;
        if (c.type === 'sequence') return;
        var fieldErrors = validateField(c, rd[c.header]);
        fieldErrors.forEach(function (reason) { errors.push('「' + c.header + '」' + reason); });
    });
    return errors;
}

/* =============================================
   字段规则：比较运算（支持多值）
   ============================================= */
function compareValues(val, operator, cmpVal) {
    val = (val || '').trim();
    cmpVal = (cmpVal || '').trim();

    switch (operator) {
        case 'is_empty':
            return val === '';
        case 'is_not_empty':
            return val !== '';
        case 'equals': {
            if (!cmpVal) return val === '';
            var opts = cmpVal.split('|').map(function(s){ return s.trim(); }).filter(Boolean);
            var nVal = parseFloat(val);
            if (!isNaN(nVal)) {
                return opts.some(function(opt){
                    var nOpt = parseFloat(opt);
                    return !isNaN(nOpt) ? nVal === nOpt : val === opt;
                });
            }
            return opts.indexOf(val) >= 0;
        }
        case 'not_equals': {
            if (!cmpVal) return val !== '';
            var opts2 = cmpVal.split('|').map(function(s){ return s.trim(); }).filter(Boolean);
            var nVal2 = parseFloat(val);
            if (!isNaN(nVal2)) {
                return opts2.every(function(opt){
                    var nOpt = parseFloat(opt);
                    return !isNaN(nOpt) ? nVal2 !== nOpt : val !== opt;
                });
            }
            return opts2.indexOf(val) < 0;
        }
        case 'greater_than': {
            if (val === '') return false;
            var n1 = parseFloat(val), n2 = parseFloat(cmpVal);
            if (isNaN(n1) || isNaN(n2)) return false;
            return n1 > n2;
        }
        case 'less_than': {
            if (val === '') return false;
            var n3 = parseFloat(val), n4 = parseFloat(cmpVal);
            if (isNaN(n3) || isNaN(n4)) return false;
            return n3 < n4;
        }
        case 'greater_equal': {
            if (val === '') return false;
            var n5 = parseFloat(val), n6 = parseFloat(cmpVal);
            if (isNaN(n5) || isNaN(n6)) return false;
            return n5 >= n6;
        }
        case 'less_equal': {
            if (val === '') return false;
            var n7 = parseFloat(val), n8 = parseFloat(cmpVal);
            if (isNaN(n7) || isNaN(n8)) return false;
            return n7 <= n8;
        }
        case 'between': {
            if (val === '') return false;
            var n = parseFloat(val);
            if (isNaN(n)) return false;
            var parts = cmpVal.split('|').map(function(s){ return parseFloat(s.trim()); });
            if (parts.length < 2 || isNaN(parts[0]) || isNaN(parts[1])) return false;
            return n >= Math.min(parts[0], parts[1]) && n <= Math.max(parts[0], parts[1]);
        }
        case 'contains': {
            if (!cmpVal) return false;
            var opts3 = cmpVal.split('|').map(function(s){ return s.trim(); }).filter(Boolean);
            return opts3.some(function(opt){ return val.indexOf(opt) >= 0; });
        }
        case 'not_contains': {
            if (!cmpVal) return true;
            var opts4 = cmpVal.split('|').map(function(s){ return s.trim(); }).filter(Boolean);
            return opts4.every(function(opt){ return val.indexOf(opt) < 0; });
        }
        default:
            return false;
    }
}

function getResolvedValue(valOrField, valueType, data) {
    if (valueType === 'field') return (data[valOrField] || '').trim();
    return (valOrField || '').trim();
}

function evaluateCondition(cond, data) {
    var srcVal = (data[cond.field] || '').trim();
    var cmpVal = getResolvedValue(cond.value, cond.valueType, data);
    return compareValues(srcVal, cond.operator, cmpVal);
}

function getOperatorLabel(op) {
    var map = {
        'equals': '等于', 'not_equals': '不等于',
        'greater_than': '大于', 'less_than': '小于',
        'greater_equal': '大于等于', 'less_equal': '小于等于',
        'between': '介于', 'contains': '包含', 'not_contains': '不包含',
        'is_empty': '为空', 'is_not_empty': '不为空'
    };
    return map[op] || op;
}

function getValueLabel(cond) {
    if (!cond) return '';
    if (cond.valueType === 'field') return '「' + cond.value + '」的值';
    if (cond.operator === 'is_empty' || cond.operator === 'is_not_empty') return '';
    return '「' + cond.value + '」';
}

function getActionLabel(type) {
    var map = {
        'require': '必须填写',
        'forbid': '必须为空',
        'copy': '自动复制',
        'validate_match': '值匹配校验',
        'equals': '等于',
        'not_equals': '不等于',
        'greater_than': '大于',
        'less_than': '小于',
        'greater_equal': '大于等于',
        'less_equal': '小于等于',
        'between': '介于',
        'contains': '包含',
        'not_contains': '不包含'
    };
    return map[type] || type;
}

function getRuleDesc(rule) {
    var cond = rule.condition || {};
    var action = rule.action || {};
    var desc = '当「' + (cond.field || '?') + '」' + getOperatorLabel(cond.operator);
    var vl = getValueLabel(cond);
    if (vl) desc += ' ' + vl;
    switch (action.type) {
        case 'require':
            desc += ' 时，「' + (action.target || '?') + '」必须填写';
            break;
        case 'forbid':
            desc += ' 时，「' + (action.target || '?') + '」必须为空';
            break;
        case 'copy':
            desc += ' 时，自动赋值到「' + (action.target || '?') + '」';
            break;
        case 'validate_match': {
            var mvl = '';
            if (action.valueType === 'field') {
                mvl = '「' + (action.value || '?') + '」';
            } else {
                mvl = '「' + (action.value || '?') + '」';
            }
            desc += ' 时，「' + (action.target || '?') + '」需与 ' + mvl + ' 匹配';
            break;
        }
        case 'equals':
        case 'not_equals':
        case 'greater_than':
        case 'less_than':
        case 'greater_equal':
        case 'less_equal':
        case 'between':
        case 'contains':
        case 'not_contains': {
            var avl = '';
            if (action.valueType === 'field') {
                avl = '「' + (action.value || '?') + '」的值';
            } else {
                avl = '「' + (action.value || '?') + '」';
            }
            desc += ' 时，「' + (action.target || '?') + '」需' + getActionLabel(action.type) + ' ' + avl;
            break;
        }
        default:
            desc += ' 时，' + (action.type || '未知操作');
    }
    return desc;
}

/* =============================================
   字段规则：应用（填报时自动生效）
   ============================================= */
/* =============================================
   字段规则：纯数据层执行 copy 规则（不依赖 DOM）
   用于批量新增、新增行等无 DOM 交互的场景
   ============================================= */
function applyCopyRules(tpl, data) {
    var rules = tpl.rules || [];
    if (!rules.length) return;

    rules.forEach(function(rule) {
        if (rule.disabled === true) return;
        var action = rule.action || {};
        if (action.type !== 'copy') return;

        var cond = rule.condition || {};
        if (!evaluateCondition(cond, data)) return;

        var srcVal = (data[cond.field] || '').trim();
        var tgtVal = (data[action.target] || '').trim();

        // 源有值且目标为空时，执行赋值
        if (srcVal && !tgtVal) {
            data[action.target] = srcVal;
        }
    });
}

function delegateFieldRules(tpl, prefix) {
    var rules = tpl.rules || [];
    if (!rules.length) return;
    var allCols = tpl.columns.filter(function(c) { return c.included; });
    var container = document.querySelector('.fill-main');
    if (!container) return;
    if (container._delegateHandler) container.removeEventListener('input', container._delegateHandler);
    var handler = function(e) {
        var el = e.target;
        if (!el.id || el.id.indexOf(prefix) !== 0) return;
        var header = el.id.replace(prefix, '');
        if (/^\d+_/.test(header)) header = header.replace(/^\d+_/, '');
        var data = {};
        allCols.forEach(function(c) {
            var cel = document.getElementById(prefix + c.header);
            data[c.header] = cel ? cel.value : '';
        });
        rules.forEach(function(rule) {
            if (rule.disabled === true) return;
            var cond = rule.condition || {};
            var action = rule.action || {};
            if (cond.field !== header) return;
            if (!evaluateCondition(cond, data)) return;
            var tgtEl = document.getElementById(prefix + action.target);
            if (!tgtEl) return;
            if (action.type === 'copy') {
                var srcVal = el.value.trim();
                if (srcVal && !tgtEl.value.trim()) {
                    tgtEl.value = srcVal;
                    tgtEl.classList.add('has-value');
                    tgtEl.dataset.ruleCopied = '1';
                }
            }
        });
    };
    container._delegateHandler = handler;
    container.addEventListener('input', handler);
}

function applyFieldRules(tpl, prefix) {
    var rules = tpl.rules || [];
    if (!rules.length) return;

    var allCols = tpl.columns.filter(function(c){ return c.included; });

    allCols.forEach(function(col) {
        var el = document.getElementById(prefix + col.header);
        if (!el) return;
        if (el._ruleHandler) el.removeEventListener('input', el._ruleHandler);

        var handler = function() {
            var data = {};
            allCols.forEach(function(c) {
                var cel = document.getElementById(prefix + c.header);
                data[c.header] = cel ? cel.value : '';
            });

            rules.forEach(function(rule) {
                if (rule.disabled === true) return;  // 【新增】跳过已禁用规则
                var cond = rule.condition || {};
                var action = rule.action || {};
                if (cond.field !== col.header) return;

                var condMet = evaluateCondition(cond, data);
                var tgtEl = document.getElementById(prefix + action.target);
                if (!tgtEl) return;

                // 条件必填：动态标记
                if (action.type === 'require') {
                    var label = tgtEl.closest('.rf');
                    if (label) {
                        var lblEl = label.querySelector('label');
                        if (lblEl) {
                            var existing = lblEl.querySelector('.rule-rq');
                            if (condMet && !existing) {
                                var span = document.createElement('span');
                                span.className = 'rule-rq';
                                span.style.cssText = 'color:var(--d);margin-left:4px;font-size:11px';
                                span.textContent = '*条件必填';
                                lblEl.appendChild(span);
                            } else if (!condMet && existing) {
                                existing.remove();
                            }
                        }
                    }
                }

                // 自动复制/赋值
                if (action.type === 'copy') {
                    if (condMet) {
                        var srcVal = el.value.trim();
                        if (srcVal && !tgtEl.value.trim()) {
                            tgtEl.value = srcVal;
                            tgtEl.classList.add('has-value');
                            tgtEl.dataset.ruleCopied = '1';
                        }
                    } else {
                        if (tgtEl.dataset.ruleCopied === '1') {
                            tgtEl.value = '';
                            delete tgtEl.dataset.ruleCopied;
                        }
                    }
                }
            });
        };

        el._ruleHandler = handler;
        el.addEventListener('input', handler);
        handler();
    });
}

/* =============================================
   字段规则：统一校验（一次遍历完成所有规则检查）
   ============================================= */
function validateAllRules(tpl, data) {
    var rules = tpl.rules || [];
    if (!rules.length) return [];
    var errors = [];

    var compareTypes = ['equals', 'not_equals', 'greater_than', 'less_than',
                        'greater_equal', 'less_equal', 'between', 'contains', 'not_contains'];

    rules.forEach(function(rule) {
        if (rule.disabled === true) return;

        var cond = rule.condition || {};
        var action = rule.action || {};

        if (!evaluateCondition(cond, data)) return;

        var tgtVal = (data[action.target] || '').trim();

        if (action.type === 'require') {
            if (tgtVal === '') {
                errors.push(
                    '当「' + (cond.field || '?') + '」' + getOperatorLabel(cond.operator) +
                    (getValueLabel(cond) ? ' ' + getValueLabel(cond) : '') +
                    '时，「' + (action.target || '?') + '」必须填写'
                );
            }
        } else if (action.type === 'forbid') {
            if (tgtVal !== '') {
                errors.push(
                    '当「' + (cond.field || '?') + '」' + getOperatorLabel(cond.operator) +
                    (getValueLabel(cond) ? ' ' + getValueLabel(cond) : '') +
                    '时，「' + (action.target || '?') + '」必须为空'
                );
            }
        } else if (action.type === 'validate_match') {
            var expectedMatch = getResolvedValue(action.value, action.valueType, data);
            if (tgtVal !== '' && tgtVal !== expectedMatch) {
                errors.push('「' + (action.target || '?') + '」应与「' + (cond.field || '?') + '」的值一致');
            }
        } else if (action.type === 'copy') {
            var srcVal = (data[cond.field] || '').trim();
            if (srcVal && tgtVal && srcVal !== tgtVal) {
                errors.push('「' + (action.target || '?') + '」已自动复制自「' + (cond.field || '?') + '」，当前值不匹配');
            }
        } else if (compareTypes.indexOf(action.type) >= 0) {
            var expectedCmp = getResolvedValue(action.value, action.valueType, data);

            if (tgtVal === '') {
                errors.push(
                    '当「' + (cond.field || '?') + '」' + getOperatorLabel(cond.operator) +
                    (getValueLabel(cond) ? ' ' + getValueLabel(cond) : '') +
                    '时，「' + (action.target || '?') + '」必须填写'
                );
                return;
            }

            var numOps = ['greater_than', 'less_than', 'greater_equal', 'less_equal', 'between'];
            if (numOps.indexOf(action.type) >= 0) {
                var tgtNum = parseFloat(tgtVal);
                if (isNaN(tgtNum)) {
                    errors.push('「' + (action.target || '?') + '」必须为有效数字');
                    return;
                }
            }

            if (!compareValues(tgtVal, action.type, expectedCmp)) {
                var actionValLabel = '';
                if (action.valueType === 'field') {
                    actionValLabel = '「' + (action.value || '?') + '」的值';
                } else {
                    actionValLabel = '「' + (action.value || '?') + '」';
                }
                errors.push(
                    '「' + (action.target || '?') + '」需' + getActionLabel(action.type) + ' ' + actionValLabel
                    + '，当前值为「' + tgtVal + '」'
                );
            }
        }
    });

    return errors;
}
 
/* =============================================
   统一校验入口：字段校验 + copy 规则 + 规则校验
   返回: 错误数组（每项含字段名和原因）
   lineNum: 可选，批量校验时传入行号，错误前缀会加上"第 X 行："
   ============================================= */
function validateAndApplyRules(tpl, ri, data, allCols, ff, user, lineNum) {
    applyCopyRules(tpl, data);
    var errors = [];
    var prefix = lineNum ? ('第 ' + lineNum + ' 行：') : '';
    allCols.forEach(function(c) {
        if (ff && c.header === ff) return;
        if (c.type === 'sequence') return;
        var fieldErrors = validateField(c, data[c.header]);
        fieldErrors.forEach(function(reason) {
            errors.push(prefix + '「' + c.header + '」' + reason);
        });
    });
    errors = errors.concat(validateAllRules(tpl, data));
    return errors;
}

function updateUserDropdown(userElId,tplElId,dateElId,showAllOption){
  showAllOption=showAllOption!==false;
  var userEl=document.getElementById(userElId);
  var tplEl=document.getElementById(tplElId);
  var dateEl=document.getElementById(dateElId);
  if(!userEl||!tplEl)return;
  var tplId=tplEl.value;
  var selDate=dateEl?dateEl.value:'';
  var allLabel=showAllOption?'全部':'全部填报人';

  // ★ 新增：重建前记录当前选中值
  var curUser = userEl.value || '';

  if(!tplId){
    userEl.innerHTML='<option value="">请先选择模板</option>';
    if(dateEl)dateEl.innerHTML='<option value="">全部</option>';
    return;
  }

  // ★ 新增：通用的 option 生成函数，自动标记 selected
  function opt(val, label){
    return '<option value="'+val+'"'+(val===curUser?' selected':'')+'>'+label+'</option>';
  }

  if(selDate){
    var tplSub=D.sub[tplId]||{};
    var daySub=tplSub[selDate]||{};
    var usersWithData=[];
    Object.keys(daySub).forEach(function(user){
      var ud=daySub[user];if(!ud)return;
      var hasData=Object.keys(ud).some(function(ri){var rd=ud[ri];return rd&&Object.values(rd).some(function(v){return v&&String(v).trim()})});
      if(hasData)usersWithData.push(user);
    });
    if(usersWithData.length){
      userEl.innerHTML=opt('',allLabel)+usersWithData.map(function(m){return opt(m,m)}).join('');
    }else{
      userEl.innerHTML='<option value="">该日期暂无填报记录</option>';
    }
  }else{
    var tplSub2=D.sub[tplId]||{};
    var allUsers=new Set();
    Object.values(tplSub2).forEach(function(daySub){
      Object.keys(daySub).forEach(function(user){
        var ud=daySub[user];if(!ud)return;
        var hasData=Object.keys(ud).some(function(ri){var rd=ud[ri];return rd&&Object.values(rd).some(function(v){return v&&String(v).trim()})});
        if(hasData)allUsers.add(user);
      });
    });
    var userList=[...allUsers];
    if(userList.length){
      userEl.innerHTML=opt('',allLabel)+userList.map(function(m){return opt(m,m)}).join('');
    }else{
      var tplMembers=getTplMembers(tplId);
      userEl.innerHTML=opt('',allLabel)+tplMembers.map(function(m){return opt(m,m)}).join('');
    }
  }
}

 async function svQF(ri) {
    if (!lockSubmit()) return;
    var tpl = getActive(); if (!tpl) return;
    var ff = tpl.filterField;
    var eCols = tpl.columns.filter(function (c) { return c.isEditable && c.included });
    var fCols = tpl.columns.filter(function (c) { return !c.isEditable && c.included });
    var allCols = tpl.columns.filter(function (c) { return c.included });
    var baseRow = (tpl.rows && tpl.rows[ri]) ? tpl.rows[ri] : {};

    // 【核心修复】同时构建 v（实际保存数据）和 merged（校验用数据）
    var v = {};
    var merged = {};
    allCols.forEach(function (c) {
        if (ff && c.header === ff) {
            merged[c.header] = cu;
            v[c.header] = cu;
        } else if (c.type === 'sequence') {
            var seqVal = getNextSeqValue(tpl, c.header);
            merged[c.header] = seqVal;
            v[c.header] = seqVal;
        } else if (c.isEditable) {
            var el = document.getElementById('qf_' + c.header);
            var val = el ? el.value.trim() : '';
            v[c.header] = val;
            merged[c.header] = val;
        } else {
            merged[c.header] = baseRow[c.header] || '';
            v[c.header] = baseRow[c.header] || '';
        }
    });

    // 字段规则校验（使用 merged，包含完整数据）
    // 优化后：先执行 copy 规则赋值，再统一校验
    // 优化后：
    applyCopyRules(tpl, merged);
    var errors = validateSubmission(tpl, ri, merged, allCols, ff, cu);
    errors = errors.concat(validateAllRules(tpl, merged));
    if (errors.length) {
        toast('⚠️ ' + errors[0]);
        return;
    }

    if (!D.sub[activeTid]) D.sub[activeTid] = {};
    if (!D.sub[activeTid][cd]) D.sub[activeTid][cd] = {};
    if (!D.sub[activeTid][cd][cu]) D.sub[activeTid][cd][cu] = {};
    D.sub[activeTid][cd][cu][ri] = v;
    await svSub(activeTid, cd, cu, { [ri]: v });
    cm(); rFill(); toast('✓ 已保存');
}

async function inheritPrev(){
  var tpl=getActive();if(!tpl)return;
  var pd=yd(cd);var pd2=((D.sub[activeTid]||{})[pd]||{})[cu];if(!pd2)return toast('未找到昨日数据');
  if(!D.sub[activeTid])D.sub[activeTid]={};if(!D.sub[activeTid][cd])D.sub[activeTid][cd]={};
  var copied={};Object.keys(pd2).forEach(function(ri){copied[ri]={...pd2[ri]}});
  D.sub[activeTid][cd][cu]=copied;await svSub(activeTid,cd,cu,copied);toast('✓ 已继承');rFill()
}

async function inheritBase(){
  var tpl=getActive();if(!tpl)return;
  if(!D.sub[activeTid])D.sub[activeTid]={};if(!D.sub[activeTid][cd])D.sub[activeTid][cd]={};

  var bd={};

  if(!Object.keys(bd).length){toast('当前填报人无匹配的基础数据');return}
  D.sub[activeTid][cd][cu]=bd;await svSub(activeTid,cd,cu,bd);toast('✓ 已加载基础数据（'+Object.keys(bd).length+'行）');rFill()

async function submitAll() {
    if (!lockSubmit()) return;
    if (!activeTid) return toast('请先选择模板');
    if (!cu) return toast('请先选择填报人');
    var tpl = getActive(); if (!tpl) return toast('暂无模板');

    var ff = tpl.filterField;
    var eCols = tpl.columns.filter(function (c) { return c.isEditable && c.included });
    var fCols = tpl.columns.filter(function (c) { return !c.isEditable && c.included });
    var allCols = tpl.columns.filter(function (c) { return c.included });
    var filtered = getFilteredRows(tpl);

    if (!filtered.length) return toast('无待填数据');
    var existing = ((D.sub[activeTid] || {})[cd] || {})[cu] || {};
    var allD = {};
    var has = false;
    var allErrors = [];

    filtered.forEach(function (item) {
        var ri = item.idx;
        var rd = {};
        var baseRow = (tpl.rows && tpl.rows[ri]) ? tpl.rows[ri] : {};
        var existRow = existing[ri] || {};
        allCols.forEach(function (c) {
            if (ff && c.header === ff) { rd[c.header] = cu; has = true }
            else if (c.type === 'sequence') { rd[c.header] = getNextSeqValue(tpl, c.header); has = true }
            else if (c.isEditable) {
                var el = document.getElementById('f_' + ri + '_' + c.header);
                if (el) {
                    var v = el.value.trim();
                    rd[c.header] = v;
                    if (v) has = true;
                } else {
                    rd[c.header] = existRow[c.header] || baseRow[c.header] || '';
                    if (rd[c.header]) has = true;
                }
            } else {
                rd[c.header] = existRow[c.header] || baseRow[c.header] || '';
            }
        });

        // 逐行校验
        // 优化后：先执行 copy 规则赋值，再统一校验
        applyCopyRules(tpl, rd);
        var rowErrors = validateSubmission(tpl, ri, rd, allCols, ff, cu);
        rowErrors = rowErrors.concat(validateAllRules(tpl, rd));
        if (rowErrors.length) {
            var rowTitle = getRowTitle(tpl, tpl.rows[ri]) || '第' + (ri + 1) + '行';
            rowErrors.forEach(function (err) {
                allErrors.push(rowTitle + ': ' + err);
            });
        }
        allD[ri] = rd;
    });

    if (!has) return toast('请先展开填报行并填写至少一项数据');

    // 显示所有校验错误
    if (allErrors.length) {
        var errorHtml = '<div class="mt">⚠️ 数据校验未通过</div>';
        errorHtml += '<div style="margin-bottom:16px;max-height:300px;overflow-y:auto">';
        allErrors.forEach(function (err) {
            errorHtml += '<div style="padding:8px;margin-bottom:6px;background:var(--dl);border-radius:var(--r);font-size:13px;color:var(--d)">' + E(err) + '</div>';
        });
        errorHtml += '</div>';
        errorHtml += '<div style="font-size:12px;color:var(--tm);margin-bottom:12px">共 ' + allErrors.length + ' 处问题，请修正后重新提交</div>';
        errorHtml += '<div class="bg"><button class="btn btn-s" onclick="cm()">关闭</button></div>';
        om(errorHtml);
        return;
    }

    var merged = { ...existing, ...allD };
    if (!D.sub[activeTid]) D.sub[activeTid] = {};
    if (!D.sub[activeTid][cd]) D.sub[activeTid][cd] = {};
    D.sub[activeTid][cd][cu] = merged;
    if (!D.members) D.members = {};
    if (!D.members[activeTid]) D.members[activeTid] = [];
    if (cu && !D.members[activeTid].includes(cu)) D.members[activeTid].push(cu);
    await svSub(activeTid, cd, cu, merged);
    toast('✓ 提交成功！');
    cu = ''; filterOverride = null; rFill();
}

async function saveNewRow() {
    if (!lockSubmit()) return;
    var tpl = getActive(); if (!tpl) return;
    var ff = tpl.filterField;
    var allCols = tpl.columns.filter(function (c) { return c.included });
    var eCols = allCols.filter(function (c) { return c.isEditable });
    var newRow = { _idx: String(tpl.rows ? tpl.rows.length : 0) };
    var hasValue = false;

    allCols.forEach(function (c) {
        var val = '';
        if (ff && c.header === ff) {
            val = cu;
        } else if (c.type === 'sequence') {
            val = getNextSeqValue(tpl, c.header);
        } else {
            var el = document.getElementById('newrow_' + c.header);
            if (el) val = sanitizeInput(el.value);
        }
        newRow[c.header] = val;
        if (val) hasValue = true;
    });

    if (!hasValue) { toast('请至少填写一项数据'); return }

    // 确保所有列都有值（非可填列从已有基础数据取）
    var baseRow0 = (tpl.rows && tpl.rows.length > 0) ? tpl.rows[0] : {};
    allCols.forEach(function(c) {
        if (newRow[c.header] === undefined || newRow[c.header] === null) {
            newRow[c.header] = baseRow0[c.header] || '';
        }
    });

    // 字段规则校验
    // 优化后：先执行 copy 规则赋值，再统一校验
    applyCopyRules(tpl, newRow);
    var errors = validateSubmission(tpl, 0, newRow, allCols, ff, cu);
    errors = errors.concat(validateAllRules(tpl, newRow));
    if (errors.length) {
        toast('⚠️ ' + errors[0]);
        return;
    }

    if (!tpl.rows) tpl.rows = [];
    tpl.rows.push(newRow);

    if (ff && newRow[ff]) {
        var memberName = String(newRow[ff]).trim();
        if (!D.members) D.members = {};
        if (!D.members[activeTid]) D.members[activeTid] = [];
        if (memberName && D.members[activeTid].indexOf(memberName) === -1) {
            D.members[activeTid].push(memberName);
        }
    }

    await svTpl(tpl);

    var newIdx = tpl.rows.length - 1;
    var submitData = {};
    eCols.forEach(function (c) {
        if (ff && c.header === ff) { submitData[c.header] = cu }
        else { submitData[c.header] = newRow[c.header] || '' }
    });
    if (!D.sub[activeTid]) D.sub[activeTid] = {};
    if (!D.sub[activeTid][cd]) D.sub[activeTid][cd] = {};
    if (!D.sub[activeTid][cd][cu]) D.sub[activeTid][cd][cu] = {};
    D.sub[activeTid][cd][cu][newIdx] = submitData;
    await svSub(activeTid, cd, cu, { [newIdx]: submitData });
    cm(); rFill(); toast('✓ 新增数据行成功');
}

/* =============================================
   辅助函数：生成表单输入框 HTML
   ============================================= */
function buildInputHTML(id, col, value, readOnly) {
    var cls = (value && !readOnly) ? 'fi has-value' : 'fi';
    var ph = '请输入' + E(col.header);
    if (readOnly) {
        switch (col.type) {
            case 'textarea': return '<input class="fi" id="' + id + '" value="' + E(value) + '" readonly style="background:var(--bl);color:var(--ts)">';
            case 'select': return '<select class="fs" id="' + id + '" disabled style="background:var(--bl);color:var(--ts)"><option value="' + E(value) + '" selected>' + E(value || '无') + '</option></select>';
            default: return '<input class="fi" id="' + id + '" value="' + E(value) + '" readonly style="background:var(--bl);color:var(--ts)">';
        }
    }
    switch (col.type) {
        case 'text': return '<input class="' + cls + '" id="' + id + '" placeholder="' + ph + '" value="' + E(value) + '">';
        case 'number': return '<input class="' + cls + '" type="number" id="' + id + '" placeholder="' + ph + '" value="' + E(value) + '">';
        case 'textarea': return '<textarea class="ft" id="' + id + '" placeholder="' + ph + '">' + E(value) + '</textarea>';
        case 'select': return '<select class="fs" id="' + id + '"><option value="">请选择</option>' + (col.uniqueValues || []).map(function (o) { return '<option value="' + E(o) + '" ' + (value === o ? 'selected' : '') + '>' + E(o) + '</option>' }).join('') + '</select>';
        case 'date': return '<input class="' + cls + '" type="date" id="' + id + '" value="' + E(value) + '">';
        case 'sequence': return '<input class="fi has-value" type="number" id="' + id + '" value="' + E(value) + '" readonly style="background:var(--vl);color:var(--violet);cursor:not-allowed;font-weight:600"><div style="font-size:11px;color:var(--violet);margin-top:4px">🔄 自动生成</div>';
        default: return '<input class="' + cls + '" id="' + id + '" value="' + E(value) + '">';
    }
}

async function saveBaseRow(tplId, ri) {

async function deleteBaseRow(tplId, ri) {

    var tplSub = D.sub[tplId] || {};

}

var editingRuleIndex = -1;

async function addRuleDirect(tplId) {
    var tpl = getTpl(tplId);
    if (!tpl) return;

    var condField = document.getElementById('ruleCondField').value;
    var condOp = document.getElementById('ruleCondOp').value;
    var condValType = document.getElementById('ruleCondValType').value;
    var condVal = '';
    if (condOp !== 'is_empty' && condOp !== 'is_not_empty') {
        condVal = condValType === 'field'
            ? document.getElementById('ruleCondValField').value
            : document.getElementById('ruleCondVal').value;
    }

    var actionType = document.getElementById('ruleActionType').value;
    var actionTarget = document.getElementById('ruleActionTarget').value;
    var actionValType = document.getElementById('ruleActionValType').value;
    var actionVal = '';

    var needActionVal = ['equals', 'not_equals', 'greater_than', 'less_than',
                         'greater_equal', 'less_equal', 'between', 'contains',
                         'not_contains', 'validate_match'].indexOf(actionType) >= 0;

    if (needActionVal) {
        actionVal = actionValType === 'field'
            ? document.getElementById('ruleActionValField').value
            : document.getElementById('ruleActionVal').value;
    }

    if (!condField) return toast('请选择条件字段');
    if (condOp !== 'is_empty' && condOp !== 'is_not_empty' && !condVal) return toast('请填写条件值');
    if (!actionTarget) return toast('请选择目标字段');
    if (condField === actionTarget) return toast('条件字段和目标字段不能相同');
    if (needActionVal && !actionVal) return toast('请填写目标值');

    if (!tpl.rules) tpl.rules = [];

    var newRule = {
        condition: {
            field: condField,
            operator: condOp,
            value: condVal,
            valueType: condValType
        },
        action: {
            type: actionType,
            target: actionTarget,
            value: actionVal,
            valueType: needActionVal ? actionValType : undefined
        }, disabled: false
    };

    if (editingRuleIndex >= 0 && editingRuleIndex < tpl.rules.length) {
        tpl.rules[editingRuleIndex] = newRule;
        editingRuleIndex = -1;
        toast('✓ 规则已更新');
    } else {
        tpl.rules.push(newRule);
        toast('✓ 规则已添加');
    }

    await svTpl(tpl);
    rTplEditor();
}

async function removeRuleDirect(tplId, idx) {
    var tpl = getTpl(tplId);
    if (!tpl || !tpl.rules) return;
    if (editingRuleIndex === idx) {
        editingRuleIndex = -1;
    } else if (editingRuleIndex > idx) {
        editingRuleIndex--;
    }
    tpl.rules.splice(idx, 1);
    await svTpl(tpl);
    rTplEditor();
    toast('✓ 规则已删除');
}

async function saveNewBaseRow(tplId) {
    if (!lockSubmit()) return;
    var tpl = getTpl(tplId);
    if (!tpl) return;
    var allCols = tpl.columns.filter(function (c) { return c.included });
    var ff = tpl.filterField;
    if (!tpl.rows) tpl.rows = [];
    var newRow = { _idx: String(tpl.rows.length) };
    var hasValue = false;

    allCols.forEach(function (c) {
        var val = '';
        if (c.type === 'sequence') {
            val = getNextSeqValue(tpl, c.header);
        } else {
            var el = document.getElementById('addbaserow_' + c.header);
            if (el) val = sanitizeInput(el.value);
        }
        newRow[c.header] = val;
        if (val) hasValue = true;
    });

    if (!hasValue) { toast('请至少填写一项数据'); return }

    // 筛选字段单独校验
    if (ff) {
        var ffVal = newRow[ff] || '';
        if (!ffVal.trim()) {
            toast('⚠️ 筛选字段「' + ff + '」为必填项');
            return;
        }
    }

    // 确保所有列都有值
    allCols.forEach(function (c) {
        if (newRow[c.header] === undefined || newRow[c.header] === null) {
            newRow[c.header] = '';
        }
    });

    var errors = validateAndApplyRules(tpl, 0, newRow, allCols, ff, '');
    if (errors.length) {
        toast('⚠️ ' + errors[0]);
        return;
    }

    // 提取成员
    if (ff && newRow[ff]) {
        var memberName = String(newRow[ff]).trim();
        if (memberName) {
            if (!D.members) D.members = {};
            if (!D.members[tplId]) D.members[tplId] = [];
            if (D.members[tplId].indexOf(memberName) === -1) {
                D.members[tplId].push(memberName);
            }
        }
    }

    tpl.rows.push(newRow);
    await svTpl(tpl);
    cm();
    rTplEditor();
    toast('✓ 新增基础数据成功（第' + tpl.rows.length + '行）');
}

// 【新增】字段查重：检测重复字段名，自动重命名并返回提示信息
// 返回 { headers: [...去重后的数组], renamed: [...被重命名的映射], hasDuplicate: true/false }
function deduplicateHeaders(headers) {
    var seen = {};
    var result = [];
    var renamed = [];
    var hasDuplicate = false;

    headers.forEach(function(header, idx) {
        var key = header.trim().toLowerCase();
        if (!seen[key]) {
            seen[key] = 1;
            result.push(header);
        } else {
            hasDuplicate = true;
            seen[key]++;
            var newName = header + '(' + seen[key] + ')';
            // 确保新名称也不重复
            while (result.some(function(h) { return h.trim().toLowerCase() === newName.trim().toLowerCase(); })) {
                seen[key]++;
                newName = header + '(' + seen[key] + ')';
            }
            result.push(newName);
            renamed.push({ index: idx, oldName: header, newName: newName });
        }
    });

    return { headers: result, renamed: renamed, hasDuplicate: hasDuplicate };
}

// 【新增】构建重复字段提示 HTML
function buildDuplicateHint(renamed) {
    var html = '<div style="margin-bottom:12px;padding:12px;background:var(--wl);border:1px solid #fbbf24;border-radius:var(--r)">';
    html += '<div style="font-size:13px;font-weight:600;color:var(--w);margin-bottom:8px">⚠️ 检测到重复字段名，已自动重命名</div>';
    renamed.forEach(function(item) {
        html += '<div style="font-size:12px;color:var(--ts);margin-bottom:4px">';
        html += '第列：「' + E(item.oldName) + '」 → 「' + E(item.newName) + '」';
        html += '</div>';
    });
    html += '<div style="font-size:11px;color:var(--tm);margin-top:6px">导入后可在模板编辑中修改字段名称，数据不会丢失</div>';
    html += '</div>';
    return html;
}

function getNextSeqValue(tpl,header){
  if(!tpl||!tpl.rows||!tpl.rows.length)return'1';
  var maxVal=0;
  tpl.rows.forEach(function(row){
    var v=row[header];
    if(v!==undefined&&v!==null&&v!==''){
      var str=String(v).trim();
      if(/^\d+$/.test(str)){var num=parseInt(str,10);if(num>maxVal)maxVal=num}
    }
  });
  var tplSub=D.sub[tpl.id]||{};
  Object.keys(tplSub).forEach(function(date){
    var daySub=tplSub[date]||{};
    Object.keys(daySub).forEach(function(user){
      var ud=daySub[user]||{};
      Object.keys(ud).forEach(function(ri){
        var rd=ud[ri];
        if(rd&&rd[header]!==undefined&&rd[header]!==null&&rd[header]!==''){
          var str=String(rd[header]).trim();
          if(/^\d+$/.test(str)){var num=parseInt(str,10);if(num>maxVal)maxVal=num}
        }
      });
    });
  });
  return String(maxVal+1);
}

async function saveBatchRows(){
  if (!lockSubmit()) return;
  var tpl=getActive();if(!tpl)return;
  var batchEl=document.getElementById('batchData');
  if(!batchEl||!batchEl.value.trim()){toast('请输入数据');return}
  var lines=batchEl.value.trim().split('\n').filter(function(l){return l.trim()});
  if(!lines.length){toast('没有有效数据');return}
  var ff=tpl.filterField;
  var allCols=tpl.columns.filter(function(c){return c.included});
  var eCols=allCols.filter(function(c){return c.isEditable});
  if(!tpl.rows)tpl.rows=[];
  var startIdx=tpl.rows.length;var errors=[];var validRows=[];
  lines.forEach(function(line,lineIdx){
    var values=line.split('|').map(function(v){return sanitizeInput(v)});
    var newRow={};newRow._idx=String(startIdx+lineIdx);
    var colIdx=0;
    allCols.forEach(function(c){
      if(ff&&c.header===ff){newRow[c.header]=cu}
      else if(c.type==='sequence'){newRow[c.header]=getNextSeqValue(tpl,c.header)}
      else{newRow[c.header]=values[colIdx]||'';colIdx++}
    });
    // 确保所有列都有值
    allCols.forEach(function(c) {
        if (newRow[c.header] === undefined || newRow[c.header] === null) {
            newRow[c.header] = '';
        }
    });
    var lineErrors = validateAndApplyRules(tpl, 0, newRow, allCols, ff, '', lineIdx + 1);
    if (lineErrors.length) { errors = errors.concat(lineErrors) }
    else { validRows.push({ row: newRow, ri: startIdx + validRows.length }) }
  });
  if(errors.length){
    var errorHtml='<div class="mt">⚠️ 数据校验失败</div><div style="margin-bottom:16px;max-height:300px;overflow-y:auto">';
    errors.forEach(function(err){errorHtml+='<div style="padding:8px;margin-bottom:6px;background:var(--dl);border-radius:var(--r);font-size:13px;color:var(--d)">'+err+'</div>'});
    errorHtml+='</div><div style="font-size:12px;color:var(--tm);margin-bottom:12px">共 '+errors.length+' 处错误，请修正后重新提交</div><div class="bg"><button class="btn btn-s" onclick="cm()">关闭</button></div>';
    om(errorHtml);return;
  }
  if(!validRows.length){toast('没有有效数据被添加');return}
  validRows.forEach(function(item){
    tpl.rows.push(item.row);
    var submitData={};
    eCols.forEach(function(c){if(ff&&c.header===ff){submitData[c.header]=cu}else{submitData[c.header]=item.row[c.header]||''}});
    if(!D.sub[activeTid])D.sub[activeTid]={};if(!D.sub[activeTid][cd])D.sub[activeTid][cd]={};if(!D.sub[activeTid][cd][cu])D.sub[activeTid][cd][cu]={};
    D.sub[activeTid][cd][cu][item.ri]=submitData;
  });
  if(!D.members)D.members={};if(!D.members[activeTid])D.members[activeTid]=[];
  if(D.members[activeTid].indexOf(cu)===-1)D.members[activeTid].push(cu);
  await svTpl(tpl);cm();rFill();toast('✓ 成功新增 '+validRows.length+' 条数据行');
}

/* =============================================
   membersEl.value=[...new Set(allVals工具函数：从二维数组指定列提取不重复的非空值
   rows: 二维数组 [[col0, col1, ...], ...]
   colIdx: 列索引
   返回: 去重后的字符串数组
   ============================================= */
function extractUniqueValues(rows, colIdx) {
    if (!rows || !rows.length || colIdx < 0) return [];
    var seen = {};
    var result = [];
    rows.forEach(function(r) {
        var v = r[colIdx];
        if (v === undefined || v === null || v === '') return;
        var key = String(v).trim();
        if (!key || seen[key]) return;
        seen[key] = true;
        result.push(key);
    });
    return result;
}

var _statAllData=[];

function collectStatData(){
  var tpl=getTpl(activeTid);
  if(!tpl)return[];
  var tplSub=D.sub[activeTid]||{};
  var result=[];
  Object.keys(tplSub).forEach(function(date){
    Object.keys(tplSub[date]||{}).forEach(function(user){
      var ud=tplSub[date][user]||{};
      Object.keys(ud).forEach(function(ri){
        var rd=ud[ri];
        if(rd&&hasAnyValue(rd)){
          var rowIdx=parseInt(ri);
          var baseRow=(tpl.rows&&tpl.rows[rowIdx])?tpl.rows[rowIdx]:{};
          result.push({date:date,user:user,ri:rowIdx,data:rd,base:baseRow});
        }
      });
    });
  });
  return result;
}

}

function doCrossStatInner(container){
  try{
    var rowDims=getSelectedDims('statCrossRow');
    var colDims=getSelectedDims('statCrossCol');
    var metrics=getMetrics();
    if(!rowDims.length&&!colDims.length){
      container.innerHTML='<div style="color:var(--tm);text-align:center;padding:12px">请至少选择一个行维度或列维度</div>';
      return;
    }
    if(!rowDims.length)rowDims=['__all__'];
    if(!colDims.length)colDims=['__all__'];
    var data=_statAllData;
    var dateEl=document.getElementById('statFilterDate');
    var userEl=document.getElementById('statFilterUser');
    var fd2=dateEl?dateEl.value:'';
    var fu2=userEl?userEl.value:'';
    if(fd2||fu2){
      data=data.filter(function(d){
        if(fd2&&d.date!==fd2)return false;
        if(fu2&&d.user!==fu2)return false;
        return true;
      });
    }
    if(!data||!data.length){
      container.innerHTML='<div style="color:var(--tm);text-align:center;padding:12px">暂无数据</div>';
      return;
    }
    function getVal(d,dim){if(dim==='__all__')return '全部';return String(d.data[dim]||d.base[dim]||'').trim()||'（空）'}
    function getNum(d,field){if(!field)return 1;var v=parseFloat(d.data[field]||d.base[field]||'');return isNaN(v)?0:v}
    function calcAgg(arr,funcType){
      if(!arr||!arr.length)return'-';
      if(funcType==='count')return String(arr.length);
      if(funcType==='pct'){var total=arr.reduce(function(a,b){return a+b},0);return total.toFixed(1)+'%';}
      var sum=0,max=arr[0],min=arr[0];
      for(var i=0;i<arr.length;i++){sum+=arr[i];if(arr[i]>max)max=arr[i];if(arr[i]<min)min=arr[i]}
      if(funcType==='sum')return sum.toFixed(1);
      if(funcType==='avg')return(sum/arr.length).toFixed(1);
      if(funcType==='max')return max.toFixed(1);
      if(funcType==='min')return min.toFixed(1);
      return String(arr.length);
    }
    function funcLabel(funcType){
      var labels={count:'计数',sum:'求和',avg:'平均',max:'最大',min:'最小',pct:'占比'};
      return labels[funcType]||'计数';
    }
    function buildGroupTree(dims,items){
      if(!dims.length)return items;
      var groups={};
      items.forEach(function(it){
        var k=getVal(it,dims[0]);
        if(!groups[k])groups[k]=[];
        groups[k].push(it);
      });
      var tree={};
      Object.keys(groups).sort().forEach(function(k){tree[k]=buildGroupTree(dims.slice(1),groups[k])});
      return tree;
    }
    function collectLeaves(tree){
      if(Array.isArray(tree))return[tree];
      if(!tree||typeof tree!=='object')return[[]];
      var result=[];
      Object.keys(tree).forEach(function(k){result=result.concat(collectLeaves(tree[k]))});
      return result;
    }

    var mpEl=document.getElementById('metricPosition');
    var mp=mpEl?mpEl.value:'col';
    var metricCount=metrics.length;
    var noColDim=colDims[0]==='__all__';
    var noRowDim=rowDims[0]==='__all__';

    var tree;
    var metricMap={};
    if(mp==='row'){
      tree={};
      metrics.forEach(function(m){
        var label=funcLabel(m.func)+(m.val?' '+m.val:'');
        tree[label]=data;
        metricMap[label]=m;
      });
    }else{
      tree=buildGroupTree(rowDims,data);
    }

    var colCombos=[];
    var seen={};
    var leafBuckets=collectLeaves(mp==='row'?buildGroupTree(rowDims,data):tree);
    var comboDims=mp==='row'?rowDims:colDims;
    leafBuckets.forEach(function(items){
      if(!items)return;
      items.forEach(function(it){
        var key=comboDims.map(function(dim){return getVal(it,dim)}).join('\x00');
        if(!seen[key]){seen[key]=1;colCombos.push(comboDims.map(function(dim){return getVal(it,dim)}))}
      });
    });
    if(mp==='row'?noRowDim:noColDim)colCombos=[['全部']];
    else colCombos.sort(function(a,b){return a.join('\x00').localeCompare(b.join('\x00'))});

    var colCount=colCombos.length||1;
    var totalCols=colCount*metricCount;
    var noHeaderDim=mp==='row'?noRowDim:noColDim;
    var headerDims=mp==='row'?rowDims:colDims;
    var headerLabel=mp==='row'?rowDims.join(' × '):rowDims.join(' × ');
    var headerLevels=noHeaderDim?0:headerDims.length;
    var treeColSpan=mp==='row'?1:rowDims.length;

    var html='<div style="font-size:12px;color:var(--tm);margin-bottom:8px">行：'+(mp==='row'?colDims.join(' → '):rowDims.join(' → '))+' · 列：'+(mp==='row'?rowDims.join(' → '):colDims.join(' → '))+' · '+metricCount+'个指标'+(mp==='row'?' · 指标在行':'')+'</div>';
    html+='<div class="data-table-wrap"><table><thead>';

    for(var lv=0;lv<headerLevels;lv++){
      html+='<tr>';
      if(lv===0){
        var hrs=headerLevels+1;
        html+='<th rowspan="'+hrs+'" style="vertical-align:middle">'+headerLabel+'</th>';
      }
      var prev=null;
      colCombos.forEach(function(ck,ci){
        var label=ck[lv]||'';
        if(prev===label)return;
        var span=1;
        for(var ni=ci+1;ni<colCombos.length&&colCombos[ni][lv]===label;ni++){span++}
        html+='<th colspan="'+(span*(mp==='row'?1:metricCount))+'">'+E(label)+'</th>';
        prev=label;
      });
      html+='</tr>';
    }

    html+='<tr>';
    if(noHeaderDim)html+='<th style="vertical-align:middle">'+headerLabel+'</th>';
    if(mp==='col'){
      colCombos.forEach(function(){
        metrics.forEach(function(m){
          var label=funcLabel(m.func)+(m.val?' '+E(m.val):'');
          html+='<th style="font-size:10px;white-space:nowrap">'+E(label)+'</th>';
        });
      });
    }
    html+='</tr>';

    html+='</thead><tbody>';

    var grandRowVals=[];
    for(var gi=0;gi<totalCols;gi++)grandRowVals.push([]);

    function renderRows(tree,dims,depth,rowPath,rowGrandVals){
      if(!tree||typeof tree!=='object')return;
      var keys=Object.keys(tree).sort();
      keys.forEach(function(k){
        var subtree=tree[k];
        var newPath=rowPath.concat(k);
        var isLastDim=dims.length<=1;

        if(!isLastDim&&typeof subtree==='object'&&!Array.isArray(subtree)){
          html+='<tr><td colspan="'+(depth===0?treeColSpan:treeColSpan-depth)+'" style="font-weight:600;background:var(--bl)">'+E(k)+'</td>';
          for(var ei=0;ei<totalCols;ei++)html+='<td style="background:var(--bl)"></td>';
          html+='</tr>';
          var subVals=[];
          for(var si=0;si<totalCols;si++)subVals.push([]);
          renderRows(subtree,dims.slice(1),depth+1,newPath,subVals);
          html+='<tr><td colspan="'+(depth===0?treeColSpan:treeColSpan-depth)+'" style="font-weight:600;background:var(--bl);text-align:right">小计</td>';
          for(var ci2=0;ci2<colCount;ci2++){
            for(var mi=0;mi<metricCount;mi++){
              var idx=ci2*metricCount+mi;
              if(rowGrandVals)rowGrandVals[idx]=rowGrandVals[idx].concat(subVals[idx]);
              grandRowVals[idx]=grandRowVals[idx].concat(subVals[idx]);
              html+='<td style="font-weight:600;background:var(--bl);text-align:center">'+calcAgg(subVals[idx],metrics[mi].func)+'</td>';
            }
          }
          html+='</tr>';
        }else{
          var items=Array.isArray(subtree)?subtree:[];
          if(mp==='row'){
            var curMetric=metricMap[k]||metrics[0];
            var curMi=metrics.indexOf(curMetric);
            html+='<tr><td style="font-weight:500;white-space:nowrap">'+E(k)+'</td>';
            var rowAll=[];
            for(var ci3=0;ci3<colCount;ci3++){
              var ck=colCombos[ci3];
              var matched=[];
              for(var fi=0;fi<items.length;fi++){
                var it=items[fi];var match=true;
                for(var dj=0;dj<rowDims.length;dj++){if(getVal(it,rowDims[dj])!==ck[dj]){match=false;break}}
                if(!match)continue;
                matched.push(it);
              }
              var vals=matched.map(function(it){return getNum(it,curMetric.val)});
              rowAll=rowAll.concat(vals);
              var bg=vals.length>0?'background:var(--p3)':'';
              html+='<td style="text-align:center;'+bg+'">'+calcAgg(vals,curMetric.func)+'</td>';
            }
            html+='<td style="text-align:center;font-weight:600;background:var(--bl)">'+calcAgg(rowAll,curMetric.func)+'</td>';
            html+='</tr>';
          }else{
            html+='<tr><td colspan="'+(depth===0?treeColSpan:treeColSpan-depth)+'" style="font-weight:500">'+E(k)+'</td>';
            for(var ci3=0;ci3<colCount;ci3++){
              var ck=colCombos[ci3];
              var matched=[];
              for(var fi=0;fi<items.length;fi++){
                var it=items[fi];var match=true;
                for(var di=0;di<rowDims.length;di++){if(getVal(it,rowDims[di])!==newPath[di]){match=false;break}}
                if(!match)continue;
                if(!noColDim){for(var dj=0;dj<colDims.length;dj++){if(getVal(it,colDims[dj])!==ck[dj]){match=false;break}}}
                if(!match)continue;
                matched.push(it);
              }
              metrics.forEach(function(m,mi){
                var vals=matched.map(function(it){return getNum(it,m.val)});
                var idx=ci3*metricCount+mi;
                if(rowGrandVals)rowGrandVals[idx]=rowGrandVals[idx].concat(vals);
                grandRowVals[idx]=grandRowVals[idx].concat(vals);
                var bg=vals.length>0?'background:var(--p3)':'';
                html+='<td style="text-align:center;'+bg+'">'+calcAgg(vals,m.func)+'</td>';
              });
            }
            html+='</tr>';
          }
        }
      });
    }

    renderRows(tree,mp==='row'?['__metric__']:rowDims,0,[],null);

    // 底部合计
    html+='<tr style="background:var(--bl)">';
    html+='<td colspan="'+treeColSpan+'" style="font-weight:600">合计</td>';
    for(var ci4=0;ci4<colCount;ci4++){
      if(mp==='row'){
        var colAll=[];
        for(var mi4=0;mi4<metricCount;mi4++){colAll=colAll.concat(grandRowVals[ci4*metricCount+mi4])}
        html+='<td style="text-align:center;font-weight:600">'+calcAgg(colAll,metrics[0].func)+'</td>';
      }else{
        metrics.forEach(function(m,mi){
          var idx=ci4*metricCount+mi;
          html+='<td style="text-align:center;font-weight:600">'+calcAgg(grandRowVals[idx],m.func)+'</td>';
        });
      }
    }
    if(mp==='row'){
      var grandAll=[];
      for(var gi4=0;gi4<metricCount;gi4++){grandAll=grandAll.concat(grandRowVals[gi4]||[])}
      html+='<td style="text-align:center;font-weight:700">'+calcAgg(grandAll,metrics[0].func)+'</td>';
    }
    html+='</tr>';

    html+='</tbody></table></div>';
    container.innerHTML=html;
  }catch(err){
    container.innerHTML='<div style="color:var(--d);text-align:center;padding:12px">计算出错：'+E(err.message)+'</div>';
  }
}

function calcAgg(vals,type){
  if(!vals||!vals.length)return'-';
  if(type==='count')return vals.length;
  var sum=0;
  var max=vals[0];
  var min=vals[0];
  for(var i=0;i<vals.length;i++){
    sum+=vals[i];
    if(vals[i]>max)max=vals[i];
    if(vals[i]<min)min=vals[i];
  }
  if(type==='sum')return sum.toFixed(1);
  if(type==='avg')return(sum/vals.length).toFixed(1);
  if(type==='max')return max.toFixed(1);
  if(type==='min')return min.toFixed(1);
  return vals.length;
}

var baseCurrentPage = 0;

function renderBasePage(page) {
    var tpl = getTpl(editingTid);
    var PS = 50;
    if (!tpl || !tpl.rows || !tpl.rows.length) {
        var tbody = document.getElementById('baseTableBody');
        if (tbody) tbody.innerHTML = '';
        var info = document.getElementById('basePageInfo');
        if (info) info.textContent = '0 / 0';
        return;
    }
    var allColsForBase = tpl.columns.filter(function(c) { return c.included; });
    var totalRows = tpl.rows.length;
    var totalPages = Math.ceil(totalRows / PS);
    baseCurrentPage = Math.max(0, Math.min(page, totalPages - 1));
    var start = baseCurrentPage * PS;
    var end = Math.min(start + PS, totalRows);
    var tbody = document.getElementById('baseTableBody');
    if (!tbody) return;
    var h = '';
    for (var ri = start; ri < end; ri++) {
        var row = tpl.rows[ri];
        h += '<tr><td style="font-weight:600;color:var(--tm)">' + (ri + 1) + '</td>';
        allColsForBase.forEach(function(c) {
            var val = row[c.header] || '';
            var bg = c.isEditable ? 'background:#fefce8' : 'background:#f1f3f5';
            h += '<td style="' + bg + ';max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + E(val) + '</td>';
        });
        h += '<td style="white-space:nowrap"><button class="btn btn-blue bs" onclick="editBaseRow(\'' + editingTid + '\',' + ri + ')" style="padding:3px 8px;font-size:11px">✏️ 编辑</button> <button class="btn btn-d bs" onclick="deleteBaseRow(\'' + editingTid + '\',' + ri + ')" style="padding:3px 8px;font-size:11px">🗑️</button></td></tr>';
    }
    tbody.innerHTML = h;
    var info = document.getElementById('basePageInfo');
    if (info) info.textContent = (baseCurrentPage + 1) + ' / ' + totalPages;
}

function basePageChange(delta) {

}

async function saveEditAll(){
  var tpl=getTpl(editingTid);if(!tpl)return;

  var nameEl=document.getElementById('editTplName');
  if(nameEl)tpl.name=nameEl.value.trim()||'未命名模板';

  var oldToNew={};
  var cols=tpl.columns.filter(function(c){return c.included});
  cols.forEach(function(col,idx){
    var oldHeader=col.header;
    var nameInput=document.querySelector('.ed-field-name[data-idx="'+idx+'"]');
    if(nameInput)col.header=nameInput.value.trim()||col.header;
    if(oldHeader!==col.header)oldToNew[oldHeader]=col.header;

    var typeSelect=document.querySelector('.ed-field-type[data-idx="'+idx+'"]');
    if(typeSelect)col.type=typeSelect.value;

    var optsInput=document.querySelector('.ed-field-opts[data-idx="'+idx+'"]');
    if(optsInput){col.uniqueValues=optsInput.value.split(',').map(function(s){return s.trim()}).filter(Boolean)}

    var editableSw=document.querySelector('.ed-field-editable[data-idx="'+idx+'"]');
    if(editableSw)col.isEditable=editableSw.classList.contains('on');

    var requiredSw=document.querySelector('.ed-field-required[data-idx="'+idx+'"]');
    if(requiredSw)col.required=requiredSw.classList.contains('on');
  });
  // 【新增】编辑保存时查重
  // 优化后：复用 deduplicateHeaders，只检测不自动重命名
  var editHeaderList = cols.map(function(c) { return c.header; });
  var editDup = deduplicateHeaders(editHeaderList);
  if (editDup.hasDuplicate) {
      var editDupNames = editDup.renamed.map(function(item) { return item.oldName; });
      toast('⚠️ 以下字段名重复：' + editDupNames.join('、') + '，请修改后保存');
      return;
  }

  if(Object.keys(oldToNew).length>0){
    if(tpl.rows){
      tpl.rows.forEach(function(row){
        Object.keys(oldToNew).forEach(function(oldKey){
          if(row.hasOwnProperty(oldKey)){
            row[oldToNew[oldKey]]=row[oldKey];
            delete row[oldKey];
          }
        });
      });
    }
    var tplSub=D.sub[editingTid]||{};
    Object.keys(tplSub).forEach(function(date){
      var daySub=tplSub[date]||{};
      Object.keys(daySub).forEach(function(user){
        var userData=daySub[user]||{};
        Object.keys(userData).forEach(function(ri){
          var rowData=userData[ri];
          if(rowData){
            Object.keys(oldToNew).forEach(function(oldKey){
              if(rowData.hasOwnProperty(oldKey)){
                rowData[oldToNew[oldKey]]=rowData[oldKey];
                delete rowData[oldKey];
              }
            });
          }
        });
      });
    });
  }

  var filterEl=document.getElementById('editFilterField');
  if(filterEl)tpl.filterField=filterEl.value;
  if(tpl.filterField&&oldToNew[tpl.filterField]){tpl.filterField=oldToNew[tpl.filterField]}

  var orderedHeaders=titleClickOrder.filter(function(header){
    return document.querySelector('.title-chip.on[data-header="'+header.replace(/"/g,'&quot;')+'"]');
  });
  tpl.titleFields=orderedHeaders.map(function(header){
    return oldToNew[header]||header;
  });

  var membersEl=document.getElementById('editTplMembers');
  if(membersEl){
    var list=membersEl.value.split('\n').map(function(s){return s.trim()}).filter(Boolean);
    if(!D.members)D.members={};
    D.members[editingTid]=list;
  }

  await svTpl(tpl, oldToNew);
  await svMembers(editingTid);

  var btn=document.getElementById('editSaveBtn');
  if(btn){
    btn.textContent='✓ 已保存';btn.style.background='var(--ok)';btn.style.borderColor='var(--ok)';
    setTimeout(function(){btn.textContent='💾 保存全部修改';btn.style.background='';btn.style.borderColor=''},1500);
  }
  toast('✓ 模板及关联数据已保存');
}

    } catch (e) {

    }

async function vAdmin() {
    var p = document.getElementById('aPwd');
    if (p) {
        try {
            var ok = await API.verifyPwd(p.value);
            if (ok) {
                aOK = true;
                rAdmin();
                toast('✓ 验证成功');
            } else {
                toast('✕ 密码错误');
            }
        } catch (err) {
            toast('✕ 验证异常');
        }
    }
}
async function svAdmin() {
    var sel = document.getElementById('setTplMember');
    var mt = document.getElementById('mList');
    if (sel && sel.value && mt) {
        var tplId = sel.value;
        var list = mt.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
        if (!D.members) D.members = {};
        D.members[tplId] = list;
        await svMembers(tplId);
    }

    var oldPwd = document.getElementById('oldPwd');
    var nPwd = document.getElementById('nPwd');
    if (nPwd && nPwd.value.trim()) {
        if (!oldPwd || !oldPwd.value.trim()) {
            toast('✕ 请输入当前密码');
            return;
        }
        var res = await API.changePwd(oldPwd.value, nPwd.value.trim());
        if (res.success) toast('✓ 密码已修改');
        else toast('✕ ' + (res.error || '失败'));
    } else {
        toast('✓ 设置已保存');
    }
}

async function delOneTpl(id){
  var tpl=getTpl(id);if(!tpl)return toast('模板不存在');

  var tplSub=D.sub[id]||{};
  var dateCount=Object.keys(tplSub).length;
  var recordCount=0;
  Object.values(tplSub).forEach(function(daySub){
    Object.keys(daySub).forEach(function(user){
      var ud=daySub[user];if(!ud)return;
